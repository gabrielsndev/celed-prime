<div class="prime-login-card">
  
  <a href="#" class="link-voltar" (click)="voltarPortal(); $event.preventDefault()">
    <span class="material-symbols-outlined">west</span>
    Voltar
  </a>

  <h1 class="titulo-bodoni">Acesse sua Conta Prime</h1>

  <form class="formulario-prime" [formGroup]="registerForm" (ngSubmit)="submitForm()">
    
    <div class="input-group">
      <input type="email" id="email" placeholder="E-mail Prime" class="prime-input" formControlName="email">
      @if (registerForm.get('email')?.invalid && registerForm.get('email')?.touched) {
        <span class="erro-mensagem">
          {{ getErrorMessage ('email') }}
        </span>
      }
    </div>

    <div class="input-group">
      <input type="password" id="senha" placeholder="Senha" class="prime-input" formControlName="password">
    </div>

    <button type="submit" class="btn-prime-entrar" [disabled]="registerForm.invalid">ENTRAR</button>

    <div class="links-footer">
      <a href="#" class="link-secundario">Esqueci minha senha</a>
      <a href="#" class="link-secundario destaque">Não sou membro? Crie sua conta</a>
    </div>

  </form>

</div>
