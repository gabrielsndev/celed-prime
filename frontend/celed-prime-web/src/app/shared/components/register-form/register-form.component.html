<div class="prime-register-card">
  
  <a class="link-voltar" (click)="voltarPortal(); $event.preventDefault()">
    <span class="material-symbols-outlined">west</span>
    Voltar
  </a>

  <h1 class="titulo-bodoni">Crie sua Experiência Prime</h1>

  <form class="formulario-prime" [formGroup]="registerForm" (ngSubmit)="submitForm()">
    
    <div class="input-group">
      <input type="text" placeholder="Nome Completo" class="prime-input" formControlName="name">
    </div>

    <div class="input-group">
      <input type="email" placeholder="E-mail Prime" class="prime-input" formControlName="email">
    </div>

    <div class="input-group">
      <input type="tel" placeholder="Telefone (apenas números)" class="prime-input" formControlName="phone" (input)="limparTelefone()">
    </div>

    <div class="input-group">
      <input type="password" placeholder="Senha (mín. 6 caracteres)" class="prime-input" formControlName="password">
    </div>

    <button type="submit" class="btn-prime-confirmar" [disabled]="registerForm.invalid">CRIAR CONTA</button>

    <div class="links-footer">
      <a (click)="voltarPortal()" class="link-secundario">Já possui uma conta? Entre aqui</a>
    </div>

  </form>
</div>
